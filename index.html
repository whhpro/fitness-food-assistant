<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>我的训练记录</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=11" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="todayText">今天</p>
          <h1>训练与饮食</h1>
        </div>
        <div class="top-actions">
          <div class="profile-badge" id="profileBadge" title="个人档案">
            <span class="mini-avatar avatar-green" id="profileAvatar"></span>
            <span id="profileName">未命名</span>
          </div>
          <button class="icon-button" id="resetDemoBtn" type="button" title="清空数据" aria-label="清空数据">↺</button>
        </div>
      </header>

      <main>
        <section class="view is-active" id="view-today" aria-labelledby="tab-today">
          <div class="summary-grid">
            <article class="metric">
              <span>本周训练</span>
              <strong id="weekWorkoutCount">0</strong>
            </article>
            <article class="metric">
              <span>本周有氧</span>
              <strong id="weekCardioCount">0</strong>
            </article>
            <article class="metric">
              <span>今日热量</span>
              <strong id="todayCalories">0</strong>
            </article>
          </div>

          <article class="panel primary-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">今日建议</p>
                <h2 id="planTitle">先填写档案</h2>
              </div>
              <span class="status-pill" id="planStatus">待初始化</span>
            </div>
            <div class="plan-block" id="planDetails"></div>
          </article>

          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">力量后有氧</p>
                <h2>爬坡 30 分钟</h2>
              </div>
              <span class="status-pill warm">15 / 4.5</span>
            </div>
            <div class="compact-list">
              <div><span>坡度</span><strong>15</strong></div>
              <div><span>速度</span><strong>4.5</strong></div>
              <div><span>时长</span><strong>30 分钟</strong></div>
            </div>
          </article>

          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">最近记录</p>
                <h2>最近 5 条</h2>
              </div>
            </div>
            <div class="timeline" id="recentTimeline"></div>
          </article>
        </section>

        <section class="view" id="view-record" aria-labelledby="tab-record">
          <article class="panel action-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">训练</p>
                <h2>点动作开始记录</h2>
              </div>
              <span class="status-pill">动作库</span>
            </div>
            <div class="filter-row" id="exerciseFilters"></div>
            <div class="action-grid" id="exerciseGrid"></div>
          </article>

          <form class="panel form-panel" id="cardioForm">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">有氧</p>
                <h2>记录爬坡</h2>
              </div>
              <span class="status-pill warm">默认 15 / 4.5</span>
            </div>
            <div class="form-grid">
              <label>
                日期
                <input name="date" type="date" required />
              </label>
              <label>
                时长 分钟
                <input name="duration" type="number" min="1" step="1" value="30" required />
              </label>
              <label>
                坡度
                <input name="incline" type="number" min="0" max="30" step="0.5" value="15" />
              </label>
              <label>
                速度
                <input name="speed" type="number" min="0" max="20" step="0.1" value="4.5" />
              </label>
              <label>
                强度
                <select name="intensity">
                  <option value="轻松">轻松</option>
                  <option value="中等" selected>中等</option>
                  <option value="较累">较累</option>
                </select>
              </label>
            </div>
            <button class="primary-button" type="submit">保存爬坡</button>
          </form>

          <form class="panel form-panel" id="swimForm">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">游泳</p>
                <h2>记录游泳</h2>
              </div>
            </div>
            <div class="form-grid">
              <label>
                日期
                <input name="date" type="date" required />
              </label>
              <label>
                时长 分钟
                <input name="duration" type="number" min="1" step="1" placeholder="45" required />
              </label>
              <label>
                距离 米
                <input name="distance" type="number" min="0" step="50" placeholder="1000" />
              </label>
              <label>
                强度
                <select name="intensity">
                  <option value="轻松">轻松</option>
                  <option value="中等">中等</option>
                  <option value="较高">较高</option>
                </select>
              </label>
            </div>
            <button class="primary-button" type="submit">保存游泳</button>
          </form>

          <form class="panel form-panel" id="foodForm">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">饮食</p>
                <h2>记录吃了什么</h2>
              </div>
              <span class="status-pill">本地估算</span>
            </div>
            <div class="photo-row">
              <label class="photo-box" for="foodPhoto">
                <input id="foodPhoto" name="photo" type="file" accept="image/*" capture="environment" />
                <span id="photoLabel">拍照 / 选图</span>
                <img id="photoPreview" alt="" />
              </label>
              <div class="photo-side">
                <label>
                  日期
                  <input name="date" type="date" required />
                </label>
                <label>
                  餐次
                  <select name="meal">
                    <option value="早餐">早餐</option>
                    <option value="午餐" selected>午餐</option>
                    <option value="晚餐">晚餐</option>
                    <option value="加餐">加餐</option>
                    <option value="夜宵">夜宵</option>
                  </select>
                </label>
                <label>
                  食物
                  <input name="name" placeholder="胡辣汤、烩面、鸡蛋" required />
                </label>
              </div>
            </div>
            <div class="form-grid">
              <label>
                份量
                <select name="portion">
                  <option value="0.5">半份</option>
                  <option value="1" selected>一份</option>
                  <option value="1.5">一份半</option>
                  <option value="2">两份</option>
                </select>
              </label>
              <label>
                热量 kcal
                <input name="calories" type="number" min="0" step="1" placeholder="自动估算" />
              </label>
            </div>
            <p class="estimate-line" id="foodEstimateLine">输入食物名后会按本地食物库估算。</p>
            <button class="primary-button" type="submit">保存饮食</button>
          </form>
        </section>

        <section class="view" id="view-history" aria-labelledby="tab-history">
          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">本周</p>
                <h2>训练分布</h2>
              </div>
            </div>
            <div class="muscle-bars" id="muscleBars"></div>
          </article>
          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">全部</p>
                <h2>历史记录</h2>
              </div>
            </div>
            <div class="timeline" id="historyTimeline"></div>
          </article>
        </section>

        <section class="view" id="view-profile" aria-labelledby="tab-profile">
          <form class="panel form-panel" id="profileForm">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">基础档案</p>
                <h2>你的身体数据</h2>
              </div>
            </div>
            <div class="profile-edit">
              <div class="avatar-upload">
                <span class="avatar-preview avatar-green" id="profilePhotoPreview"></span>
                <label class="upload-button" for="profilePhoto">选头像</label>
                <input id="profilePhoto" type="file" accept="image/*" />
                <input name="avatarImage" type="hidden" />
              </div>
              <div class="avatar-picker" aria-label="选择头像">
                <label>
                  <input name="avatar" type="radio" value="green" checked />
                  <span class="avatar-choice avatar-green"></span>
                </label>
                <label>
                  <input name="avatar" type="radio" value="teal" />
                  <span class="avatar-choice avatar-teal"></span>
                </label>
                <label>
                  <input name="avatar" type="radio" value="amber" />
                  <span class="avatar-choice avatar-amber"></span>
                </label>
                <label>
                  <input name="avatar" type="radio" value="ink" />
                  <span class="avatar-choice avatar-ink"></span>
                </label>
              </div>
              <label>
                名字
                <input name="name" placeholder="比如 小王" />
              </label>
            </div>
            <div class="form-grid">
              <label>
                身高 cm
                <input name="height" type="number" min="100" max="230" required />
              </label>
              <label>
                体重 kg
                <input name="weight" type="number" min="30" max="250" step="0.1" required />
              </label>
              <label>
                年龄
                <input name="age" type="number" min="12" max="100" />
              </label>
              <label>
                性别
                <select name="sex">
                  <option value="男">男</option>
                  <option value="女">女</option>
                  <option value="其他">其他</option>
                </select>
              </label>
              <label>
                目标
                <select name="goal">
                  <option value="减脂">减脂</option>
                  <option value="增肌">增肌</option>
                  <option value="保持">保持</option>
                </select>
              </label>
              <label>
                每周训练天数
                <input name="daysPerWeek" type="number" min="1" max="7" value="4" />
              </label>
            </div>

            <div class="subsection-title">当前常用工作重量</div>
            <div class="form-grid">
              <label>
                卧推 kg
                <input name="bench" type="number" min="0" step="0.5" />
              </label>
              <label>
                深蹲 kg
                <input name="squat" type="number" min="0" step="0.5" />
              </label>
              <label>
                硬拉 kg
                <input name="deadlift" type="number" min="0" step="0.5" />
              </label>
              <label>
                肩推 kg
                <input name="press" type="number" min="0" step="0.5" />
              </label>
              <label>
                划船 kg
                <input name="row" type="number" min="0" step="0.5" />
              </label>
              <label>
                游泳水平
                <select name="swimLevel">
                  <option value="入门">入门</option>
                  <option value="中等">中等</option>
                  <option value="熟练">熟练</option>
                </select>
              </label>
            </div>
            <label class="full-label">
              忌口 / 伤病
              <textarea name="notes" rows="3" placeholder="比如膝盖不舒服、少油、少辣"></textarea>
            </label>
            <button class="primary-button" type="submit">保存档案</button>
          </form>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-button is-active" id="tab-today" type="button" data-view="today">今天</button>
        <button class="nav-button" id="tab-record" type="button" data-view="record">记录</button>
        <button class="nav-button" id="tab-history" type="button" data-view="history">历史</button>
        <button class="nav-button" id="tab-profile" type="button" data-view="profile">档案</button>
      </nav>
    </div>

    <div class="sheet-backdrop" id="workoutSheet" hidden>
      <form class="sheet" id="actionWorkoutForm">
        <button class="sheet-close" id="closeWorkoutSheet" type="button" aria-label="关闭">×</button>
        <div class="sheet-hero">
          <div class="sheet-icon" id="sheetExerciseIcon"></div>
          <div>
            <p class="eyebrow" id="sheetExerciseMuscle">训练</p>
            <h2 id="sheetExerciseName">动作</h2>
            <p class="sheet-hint" id="sheetExerciseHint">填写这次训练数据</p>
          </div>
        </div>
        <input name="exercise" type="hidden" />
        <input name="muscle" type="hidden" />
        <div class="form-grid">
          <label>
            日期
            <input name="date" type="date" required />
          </label>
          <label>
            重量 kg
            <input name="weight" type="number" min="0" step="0.5" placeholder="可不填" />
          </label>
          <label>
            组数
            <input name="sets" type="number" min="1" step="1" placeholder="4" />
          </label>
          <label>
            每组次数
            <input name="reps" type="number" min="1" step="1" placeholder="10" />
          </label>
          <label>
            总时长 分钟
            <input name="duration" type="number" min="1" step="1" placeholder="45" />
          </label>
          <label>
            疲劳感 1-10
            <input name="effort" type="range" min="1" max="10" value="6" />
          </label>
        </div>
        <button class="primary-button" type="submit">保存这个动作</button>
      </form>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=11" defer></script>
  </body>
</html>
